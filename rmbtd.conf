# RMBT server configuration

# TLS listen port — defaults to [::]:443 and 0.0.0.0:443 (both IPv4 and IPv6).
# Plain TCP is disabled by default; use -l <addr> on the CLI to enable it.
server_tls_port = 443
# cert_path = /etc/ssl/certs/rmbtd.crt
# key_path  = /etc/ssl/private/rmbtd.key

# Worker thread count (default: 200)
server_workers = 200

# Token authentication
# Path to the secret key file (format: "key [label]", one per line).
# Multiple keys are supported for key rotation.
secret_key_path = secret.key
# Set to false to accept all tokens without HMAC verification (testing only).
check_token = true
# Accept only v2 tokens (SHA256, open-rmbt-udp-ping schema, bound to source IP + time);
# reject legacy v1 tokens. Default false (both v1 and v2 accepted). CLI --v2-only forces true.
v2_only = false

# Maximum chunk size in bytes (default: 4 MiB)
max_chunk_size = 4194304

# Log level: info | debug | trace  (comment out to disable logging)
# logger = info
