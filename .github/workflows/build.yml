name: Build

on:
  push:
  pull_request:

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # Unit tests (native, debug)
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Test / linux-x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test

  # ─────────────────────────────────────────────────────────────────────────────
  # Release binaries — static musl for Linux; native for macOS; MSVC for Windows
  # ─────────────────────────────────────────────────────────────────────────────
  server:
    name: Server / ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            name: linux-x64
            use_cross: false

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            name: linux-arm64
            use_cross: true

          - os: macos-latest
            target: aarch64-apple-darwin
            name: macos-arm64
            use_cross: false

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x64
            use_cross: false

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Caches cargo registry, git and target/; also caches installed binaries
      # (e.g. cross) under ~/.cargo/bin. Keyed per target.
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl-tools (Linux x64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.use_cross == true
        run: cargo install cross --locked

      - name: Build (native)
        if: matrix.use_cross == false
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross — Docker-based)
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/rmbtd dist/
          cd dist && zip rmbtd-${{ matrix.name }}.zip rmbtd

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item "target\${{ matrix.target }}\release\rmbtd.exe" dist\
          Compress-Archive -Path dist\rmbtd.exe -DestinationPath dist\rmbtd-${{ matrix.name }}.zip

      - uses: actions/upload-artifact@v5
        with:
          name: server-${{ matrix.name }}
          path: dist/rmbtd-${{ matrix.name }}.zip
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────────────
  # GitHub Release — only on tag push
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    needs: [test, server]
    if: github.ref_type == 'tag'
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets

      - name: List assets
        run: find release-assets -type f | sort

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/server-linux-x64/*.zip
            release-assets/server-linux-arm64/*.zip
            release-assets/server-macos-arm64/*.zip
            release-assets/server-windows-x64/*.zip
          token: ${{ secrets.GITHUB_TOKEN }}
